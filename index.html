<!doctype html>
<html lang="en">
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
    <link rel="icon" type="image/ico" href="favicon.ico" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://boost-baguio.web.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://boost-baguio.web.app/" />
    <meta property="og:title" content="Boost Baguio - Your Premium City Navigation App" />
    <meta
      property="og:description"
      content="Navigate Baguio City with ease using APANAM jeepney routes, MAYKAN tourist spots, ARAMIDEM events calendar, and AYAN MO nearby places."
    />
    <meta property="og:image" content="https://boost-baguio.web.app/og-image.png" />
    <meta property="og:site_name" content="Boost Baguio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://boost-baguio.web.app/" />
    <meta name="twitter:title" content="Boost Baguio - Your Premium City Navigation App" />
    <meta
      name="twitter:description"
      content="Navigate Baguio City with ease using APANAM jeepney routes, MAYKAN tourist spots, ARAMIDEM events calendar, and AYAN MO nearby places."
    />
    <meta name="twitter:image" content="https://boost-baguio.web.app/og-image.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#027be3" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />

    <!-- Preconnect to Firebase -->
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
